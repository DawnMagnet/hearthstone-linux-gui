name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dist:
    name: Build Nix release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Show release context
        shell: bash
        run: |
          set -euo pipefail
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"
          nix --version

      - name: Prepare artifact names
        id: names
        shell: bash
        run: |
          set -euo pipefail
          suffix="${GITHUB_REF_NAME//\//-}"
          echo "artifact_suffix=${suffix}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches Cargo version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

      - name: Build AppImage
        id: appimage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-dist/appimage
          out_path="$(nix build .#AppImage --print-out-paths)"
          echo "out_path=${out_path}" >> "$GITHUB_OUTPUT"
          mapfile -t appimages < <(find -L "$out_path" -maxdepth 2 -type f -name '*.AppImage' | sort)
          if [ "${#appimages[@]}" -eq 0 ]; then
            echo "No AppImage found in ${out_path}" >&2
            exit 1
          fi
          cp -f "${appimages[@]}" release-dist/appimage/
          find -L release-dist -maxdepth 3 -type f -printf '%p %s bytes\n' | sort

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearthstone-linux-gui-${{ steps.names.outputs.artifact_suffix }}-appimage
          path: release-dist/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 90

      - name: Build native packages via Docker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-dist/native

          docker build \
            -f packaging/native/Dockerfile \
            --target dist \
            --output type=local,dest=release-dist/native \
            .

          find -L release-dist -maxdepth 3 -type f -printf '%p %s bytes\n' | sort

      - name: Upload native package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hearthstone-linux-gui-${{ steps.names.outputs.artifact_suffix }}-native-packages
          path: |
            release-dist/native/*.deb
            release-dist/native/*.rpm
            release-dist/native/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 90

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-dist -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum > release-dist/SHA256SUMS.txt
          {
            echo "## hearthstone-linux-gui artifacts"
            echo
            echo "| File | Size |"
            echo "| --- | ---: |"
            while IFS= read -r file; do
              size="$(stat -c '%s' "$file")"
              echo "| \`${file#release-dist/}\` | ${size} bytes |"
            done < <(find release-dist -type f | sort)
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearthstone-linux-gui-${{ steps.names.outputs.artifact_suffix }}-checksums
          path: release-dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90

      - name: Create release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Automated release for ${GITHUB_REF_NAME}.

          ## Downloads

          - AppImage: portable x86_64 build for general Linux use.
          - DEB/RPM/Pacman: native packages built by the Docker packaging pipeline.
          - Nix users can build the native package with \`nix build github:${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}\`.

          ## Verification

          Download \`SHA256SUMS.txt\` from this release and verify with:

          \`\`\`sh
          sha256sum -c SHA256SUMS.txt
          \`\`\`
          EOF

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          prerelease_args=()
          if [[ "$tag" =~ (alpha|beta|rc) ]]; then
            prerelease_args+=(--prerelease)
          fi

          mapfile -t assets < <(find release-dist -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg.tar.zst' -o -name 'SHA256SUMS.txt' \) \
            | sort)

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$tag" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
          fi
