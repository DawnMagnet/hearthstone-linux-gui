name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dist:
    name: Build Nix release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Show release context
        shell: bash
        run: |
          set -euo pipefail
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"
          nix --version

      - name: Prepare artifact names
        id: names
        shell: bash
        run: |
          set -euo pipefail
          suffix="${GITHUB_REF_NAME//\//-}"
          echo "artifact_suffix=${suffix}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches Cargo version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

      # Note: native/deb/rpm/pacman packages are produced via separate
      # Docker-based pipelines. This workflow only builds the AppImage via Nix.

      - name: Build AppImage
        id: appimage
        shell: bash
        run: |
          set -euo pipefail
          out_path="$(nix build .#AppImage --print-out-paths)"
          echo "out_path=${out_path}" >> "$GITHUB_OUTPUT"
          find -L "$out_path" -maxdepth 2 -type f -printf '%p %s bytes\n' | sort

      - name: Create release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Automated release for ${GITHUB_REF_NAME}.

          ## Downloads

          - AppImage: portable x86_64 build for general Linux use (built by this workflow via Nix).
          - Other native package formats (deb/rpm/pacman) are produced by separate Docker-based pipelines and are not attached to this release.

          ## Verification

          Download `SHA256SUMS.txt` from this release and verify with:

          ```sh
          sha256sum -c SHA256SUMS.txt
          ```
          EOF
          set -euo pipefail
          {
            echo "## hearthstone-linux-gui artifacts"
            echo
            echo "| File | Size |"
            echo "| --- | ---: |"
            while IFS= read -r file; do
              size="$(stat -c '%s' "$file")"
              echo "| \`${file#release-dist/}\` | ${size} bytes |"
            done < <(find release-dist -type f | sort)
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearthstone-linux-gui-${{ steps.names.outputs.artifact_suffix }}-appimage
          path: release-dist/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 90

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearthstone-linux-gui-${{ steps.names.outputs.artifact_suffix }}-checksums
          path: release-dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90

      - name: Build native packages via Docker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-dist/deb release-dist/rpm release-dist/pacman

          # Debian (.deb)
          if [ -f packaging/deb-rpm/deb.Dockerfile ]; then
            docker build -f packaging/deb-rpm/deb.Dockerfile -t hearthstone-deb:latest .
            docker run --rm -v "$PWD/release-dist/deb":/out hearthstone-deb:latest
          elif [ -f packaging/deb-rpm/Dockerfile ]; then
            docker build -f packaging/deb-rpm/Dockerfile -t hearthstone-deb:latest --target deb . || true
            docker run --rm -v "$PWD/release-dist/deb":/out hearthstone-deb:latest || true
          else
            echo "No deb Dockerfile found; skipping deb"
          fi

          # RPM (.rpm)
          if [ -f packaging/deb-rpm/rpm.Dockerfile ]; then
            docker build -f packaging/deb-rpm/rpm.Dockerfile -t hearthstone-rpm:latest .
            docker run --rm -v "$PWD/release-dist/rpm":/out hearthstone-rpm:latest
          elif [ -f packaging/deb-rpm/Dockerfile ]; then
            docker build -f packaging/deb-rpm/Dockerfile -t hearthstone-rpm:latest --target rpm . || true
            docker run --rm -v "$PWD/release-dist/rpm":/out hearthstone-rpm:latest || true
          else
            echo "No rpm Dockerfile found; skipping rpm"
          fi

          # Pacman (.pkg.tar.zst)
          if [ -f packaging/pacman/Dockerfile ]; then
            docker build -f packaging/pacman/Dockerfile -t hearthstone-pacman:latest .
            docker run --rm -v "$PWD/release-dist/pacman":/out hearthstone-pacman:latest
          else
            echo "No pacman Dockerfile found; skipping pacman"
          fi

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearthstone-linux-gui-${{ steps.names.outputs.artifact_suffix }}-deb
          path: release-dist/deb/*
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearthstone-linux-gui-${{ steps.names.outputs.artifact_suffix }}-rpm
          path: release-dist/rpm/*
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload pacman artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearthstone-linux-gui-${{ steps.names.outputs.artifact_suffix }}-pacman
          path: release-dist/pacman/*
          if-no-files-found: ignore
          retention-days: 90

      - name: Create release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Automated release for ${GITHUB_REF_NAME}.

          ## Downloads

          - AppImage: portable x86_64 build for general Linux use.
          - Nix users can build the native package with \`nix build github:${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}\`.

          ## Verification

          Download \`SHA256SUMS.txt\` from this release and verify with:

          \`\`\`sh
          sha256sum -c SHA256SUMS.txt
          \`\`\`
          EOF

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          prerelease_args=()
          if [[ "$tag" =~ (alpha|beta|rc) ]]; then
            prerelease_args+=(--prerelease)
          fi

          mapfile -t assets < <(find release-dist -type f \
            \( -name '*.AppImage' -o -name 'SHA256SUMS.txt' \) \
            | sort)

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$tag" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
          fi
